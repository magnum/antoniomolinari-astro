backend:
  name: github
  repo: magnum/antoniomolinari-astro
  branch: main
  # OAuth is brokered by Netlify (Site configuration → Access control → OAuth).
  # No base_url needed: Decap defaults to Netlify's OAuth endpoint.

# "editorial_workflow" = each entry is a branch + PR; only merging
# ("Publish" in Decap) lands on `branch` and triggers a production build.
# Set to "simple" to commit directly to `branch` (a build per save).
publish_mode: editorial_workflow

# Uploaded media lives in public/ and is served from the site root.
media_folder: "public/uploads"
public_folder: "/uploads"

locale: "en"

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    identifier_field: "title"
    summary: "{{title}} — {{pubDatetime}}"
    sortable_fields: ["pubDatetime", "title"]
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - {
          name: "pubDatetime",
          label: "Published",
          widget: "datetime",
          date_format: "YYYY-MM-DD",
          time_format: "HH:mm",
          picker_utc: true,
          default: "{{now}}",
        }
      - {
          name: "modDatetime",
          label: "Last modified",
          widget: "datetime",
          required: false,
          picker_utc: true,
          date_format: "YYYY-MM-DD",
          time_format: "HH:mm",
        }
      - { name: "description", label: "Description", widget: "text", hint: "One sentence, used in lists and meta tags." }
      - {
          name: "tags",
          label: "Tags",
          widget: "list",
          default: ["others"],
        }
      - { name: "draft", label: "Draft", widget: "boolean", required: false, default: false }
      - { name: "featured", label: "Featured", widget: "boolean", required: false, default: false }
      - { name: "ogImage", label: "OG image", widget: "image", required: false, hint: "Optional social-share image." }
      - { name: "canonicalURL", label: "Canonical URL", widget: "string", required: false }
      - {
          name: "crosspostedToSubstack",
          label: "Cross-posted to Substack",
          widget: "boolean",
          required: false,
          default: false,
        }
      - { name: "substackUrl", label: "Substack URL", widget: "string", required: false }
      - { name: "author", label: "Author", widget: "string", required: false, default: "Antonio Molinari" }
      - { name: "body", label: "Body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    identifier_field: "title"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "text", required: false }
      - { name: "ogImage", label: "OG image", widget: "image", required: false }
      - { name: "canonicalURL", label: "Canonical URL", widget: "string", required: false }
      - { name: "body", label: "Body", widget: "markdown" }

  # Singleton "blocks" that aren't standalone pages.
  - name: "site"
    label: "Site blocks"
    files:
      - name: "headline"
        label: "Homepage headline"
        file: "src/content/site/headline.md"
        format: "yaml-frontmatter"
        fields:
          - { name: "heading", label: "Heading", widget: "string" }
          - {
              name: "body",
              label: "Bio",
              widget: "markdown",
              hint: "Intro paragraphs shown under the heading.",
            }
      - name: "analytics"
        label: "Google Analytics"
        file: "src/data/analytics.json"
        fields:
          - {
              name: "enabled",
              label: "Enabled",
              widget: "boolean",
              default: true,
              hint: "Turn tracking on/off (only active in production builds).",
            }
          - {
              name: "googleAnalyticsId",
              label: "Measurement ID",
              widget: "string",
              hint: "e.g. G-XXXXXXXXXX",
            }
      - name: "socials"
        label: "Social links"
        file: "src/data/socials.json"
        fields:
          - name: "socials"
            label: "Links"
            label_singular: "Link"
            widget: "list"
            summary: "{{fields.name}} — {{fields.url}}"
            fields:
              - {
                  name: "name",
                  label: "Icon",
                  widget: "string",
                  hint: "Must match an SVG filename in src/assets/icons/socials/ (e.g. github, substack, mail). Unknown names fall back to a globe icon.",
                }
              - { name: "url", label: "URL", widget: "string" }
              - {
                  name: "linkTitle",
                  label: "Custom label",
                  widget: "string",
                  required: false,
                  hint: "Optional accessible label; auto-generated if empty.",
                }
